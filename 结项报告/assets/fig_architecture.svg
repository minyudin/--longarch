<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f3eb"/>
      <stop offset="100%" stop-color="#efe9de"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1a1714" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#9d9690"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <text x="460" y="36" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#1a1714">Smart Agriculture IMS - Architecture (plan)</text>
  <text x="460" y="56" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#6b6460">Perception + MQTT / Spring Boot / React admin + Taro mini program / REST</text>

  <rect x="40" y="78" width="840" height="118" rx="8" fill="#ffffff" stroke="#d4cec9" filter="url(#shadow)"/>
  <text x="56" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#c4502a">PERCEPTION</text>
  <text x="56" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6b6460">Sensors at 3 greenhouses, multi points</text>
  <rect x="56" y="128" width="768" height="56" rx="6" fill="#faf8f5" stroke="#d4cec9"/>
  <text x="440" y="158" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#1a1714">Gateway / edge node - MQTT publish (telemetry)</text>

  <rect x="40" y="218" width="840" height="96" rx="8" fill="#ffffff" stroke="#d4cec9" filter="url(#shadow)"/>
  <text x="56" y="240" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#c4502a">SERVICE</text>
  <rect x="56" y="250" width="808" height="52" rx="6" fill="#1a1714" stroke="#1a1714"/>
  <text x="460" y="278" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#f7f3eb">Spring Boot - MQTT subscribe, parse, MySQL, REST, Sa-Token auth</text>
  <text x="460" y="294" text-anchor="middle" font-family="Consolas, monospace" font-size="9.5" fill="#b8a98c">MyBatis-Plus, Sa-Token, Redis, Mosquitto, Paho / Spring Integration</text>

  <rect x="40" y="334" width="840" height="120" rx="8" fill="#ffffff" stroke="#d4cec9" filter="url(#shadow)"/>
  <text x="56" y="356" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#c4502a">PRESENTATION</text>
  <rect x="56" y="368" width="400" height="72" rx="6" fill="#faf8f5" stroke="#d4cec9"/>
  <text x="256" y="396" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1a1714">PC admin: React + Vite + TS</text>
  <text x="256" y="414" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6b6460">ECharts, TanStack Query, dashboard</text>
  <rect x="472" y="368" width="392" height="72" rx="6" fill="#faf8f5" stroke="#d4cec9"/>
  <text x="668" y="396" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#1a1714">WeChat: Taro + React + TS</text>
  <text x="668" y="414" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6b6460">Adoption, tasks, operator workbench, H5 preview</text>

  <line x1="460" y1="196" x2="460" y2="218" stroke="#9d9690" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="460" y1="314" x2="460" y2="334" stroke="#9d9690" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 400 314 Q 400 324 246 368" stroke="#c4502a" stroke-width="1.2" fill="none" stroke-dasharray="4 3"/>
  <text x="300" y="348" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#c4502a">REST + optional WS</text>

  <rect x="40" y="472" width="840" height="72" rx="6" fill="#faf8f5" stroke="#e5dfd8"/>
  <text x="56" y="492" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6b6460">Legend: solid arrows = MQTT uplink and REST downlink. MySQL 8.0 stores greenhouse, plot, sensor, time-series data.</text>
  <text x="56" y="510" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6b6460">Matches project plan: perception / service / presentation three layers.</text>
</svg>
