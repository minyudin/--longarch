<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="980" viewBox="0 0 1320 980">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf8f5"/><stop offset="100%" stop-color="#efe9de"/>
    </linearGradient>
    <filter id="cardShadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
    <marker id="arrGray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#6b6560"/></marker>
    <marker id="arrIoT" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#c4502a"/></marker>
    <marker id="arrBiz" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#2d6a5d"/></marker>
    <marker id="arrScr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#5c4d7d"/></marker>
    <style><![CDATA[
      .title { font-family: "Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif; font-size: 18px; font-weight: 700; fill: #1a1714; }
      .subtitle { font-family: "Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif; font-size: 11px; fill: #6b6560; }
      .laneLabel { font-family: "Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif; font-size: 12px; font-weight: 700; fill: #4a4540; }
      .boxTitle { font-family: "Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif; font-size: 11px; font-weight: 600; fill: #1a1714; }
      .boxSub { font-family: "Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif; font-size: 9px; fill: #6b6560; }
      .note { font-family: "Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif; font-size: 9px; fill: #8a827a; }
    ]]></style>
  </defs>
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  <text x="660" y="36" text-anchor="middle" class="title">智慧农业信息管理系统 · 完整业务链路</text>
  <text x="660" y="56" text-anchor="middle" class="subtitle">感知采集 · 平台服务 · 多端展示 · 认养与作业协同 · 大屏独立鉴权（交叉弧线表示业务关联，非严格时序）</text>
  <rect x="20" y="72" width="1280" height="118" rx="6" fill="#f0ebe3" stroke="#d8cfc4" stroke-dasharray="4 3"/>
  <text x="36" y="92" class="laneLabel">终端与角色</text>
  <rect x="20" y="210" width="1280" height="168" rx="6" fill="#e8f0ec" stroke="#c5d5cb"/>
  <text x="36" y="232" class="laneLabel">前端应用（Vue / React / Taro）</text>
  <rect x="20" y="398" width="1280" height="142" rx="6" fill="#ebe8f2" stroke="#cfc8dc"/>
  <text x="36" y="420" class="laneLabel">接入层协议</text>
  <rect x="20" y="558" width="1280" height="188" rx="6" fill="#f5f1ea" stroke="#d4cec9"/>
  <text x="36" y="580" class="laneLabel">后端服务（Spring Boot · /api/v1）</text>
  <rect x="20" y="764" width="1280" height="168" rx="6" fill="#eaeef5" stroke="#c5cbd8"/>
  <text x="36" y="786" class="laneLabel">数据与中间件</text>
  <rect x="44" y="108" width="168" height="64" rx="8" fill="#fff" stroke="#c4502a" stroke-width="1.2" filter="url(#cardShadow)"/>
  <text x="128" y="132" text-anchor="middle" class="boxTitle">大棚管理员 / 系统管理员</text>
  <text x="128" y="150" text-anchor="middle" class="boxSub">个人电脑：设备 · 地块 · 权限</text>
  <rect x="236" y="108" width="168" height="64" rx="8" fill="#fff" stroke="#5c4d7d" stroke-width="1.2" filter="url(#cardShadow)"/>
  <text x="320" y="132" text-anchor="middle" class="boxTitle">数据分析员</text>
  <text x="320" y="150" text-anchor="middle" class="boxSub">查询 · 导出 · 趋势分析</text>
  <rect x="428" y="108" width="168" height="64" rx="8" fill="#fff" stroke="#2d6a5d" stroke-width="1.2" filter="url(#cardShadow)"/>
  <text x="512" y="132" text-anchor="middle" class="boxTitle">认养者（小程序）</text>
  <text x="512" y="150" text-anchor="middle" class="boxSub">认养 · 地块 · 发起作业任务</text>
  <rect x="620" y="108" width="168" height="64" rx="8" fill="#fff" stroke="#2d6a5d" stroke-width="1.2" filter="url(#cardShadow)"/>
  <text x="704" y="132" text-anchor="middle" class="boxTitle">操作员（小程序）</text>
  <text x="704" y="150" text-anchor="middle" class="boxSub">审核 · 责任域筛选</text>
  <rect x="812" y="108" width="168" height="64" rx="8" fill="#fff" stroke="#8b7355" stroke-width="1.2" filter="url(#cardShadow)"/>
  <text x="896" y="132" text-anchor="middle" class="boxTitle">大屏观众（现场）</text>
  <text x="896" y="150" text-anchor="middle" class="boxSub">会议室 / 棚头展示</text>
  <rect x="1004" y="108" width="276" height="64" rx="8" fill="#faf8f5" stroke="#9d9690" filter="url(#cardShadow)"/>
  <text x="1142" y="130" text-anchor="middle" class="boxTitle">物联网现场</text>
  <text x="1142" y="148" text-anchor="middle" class="boxSub">传感器网关 · 执行器 ·（可选摄像头）</text>
  <rect x="44" y="254" width="200" height="96" rx="8" fill="#fff" stroke="#3d5a80" stroke-width="1.3" filter="url(#cardShadow)"/>
  <text x="144" y="282" text-anchor="middle" class="boxTitle">个人电脑管理后台</text>
  <text x="144" y="302" text-anchor="middle" class="boxSub">Vue 版（longarch-admin）</text>
  <text x="144" y="318" text-anchor="middle" class="boxSub">React 版（longarch-admin-next）</text>
  <text x="144" y="336" text-anchor="middle" class="boxSub">登录会话 · 图表（Sa-Token / ECharts）</text>
  <rect x="268" y="254" width="200" height="96" rx="8" fill="#fff" stroke="#5c4d7d" stroke-width="1.3" filter="url(#cardShadow)"/>
  <text x="368" y="282" text-anchor="middle" class="boxTitle">独立可视化大屏</text>
  <text x="368" y="302" text-anchor="middle" class="boxSub">大屏前端（bridge-viz）</text>
  <text x="368" y="318" text-anchor="middle" class="boxSub">大屏专用令牌鉴权</text>
  <text x="368" y="336" text-anchor="middle" class="boxSub">大棚列表 · 总览 · 环境历史曲线</text>
  <rect x="492" y="254" width="200" height="96" rx="8" fill="#fff" stroke="#2d6a5d" stroke-width="1.3" filter="url(#cardShadow)"/>
  <text x="592" y="282" text-anchor="middle" class="boxTitle">微信小程序（Taro）</text>
  <text x="592" y="302" text-anchor="middle" class="boxSub">认养 · 任务 · 工作台</text>
  <text x="592" y="318" text-anchor="middle" class="boxSub">请求头携带令牌（satoken）</text>
  <text x="592" y="336" text-anchor="middle" class="boxSub">与后端接口契约一致（REST）</text>
  <rect x="716" y="254" width="564" height="96" rx="8" fill="#faf8f5" stroke="#c4502a" stroke-dasharray="6 4" filter="url(#cardShadow)"/>
  <text x="998" y="284" text-anchor="middle" class="boxTitle">说明：管理端「绑定大屏」生成大屏令牌；大屏仅调用大屏接口，不使用管理员登录态</text>
  <text x="998" y="306" text-anchor="middle" class="boxSub">作业任务：认养端写入作业表 → 操作员审核 → 队列与执行器 → 消息下发与设备回调闭环</text>
  <text x="998" y="328" text-anchor="middle" class="boxSub">传感器遥测：消息主题分流 → 时序入库 → 仪表盘 · 大屏 · 查询共用同一持久化数据</text>
  <rect x="44" y="438" width="380" height="84" rx="8" fill="#fff" stroke="#3d5a80" filter="url(#cardShadow)"/>
  <text x="234" y="468" text-anchor="middle" class="boxTitle">HTTPS · 网页接口（/api/v1）</text>
  <text x="234" y="488" text-anchor="middle" class="boxSub">管理端与小程序 · 在线接口文档（doc.html）· 会话与 Redis</text>
  <text x="234" y="504" text-anchor="middle" class="boxSub">聚合接口：认养 · 任务 · 地块 · 传感器等设备与运维</text>
  <rect x="440" y="438" width="380" height="84" rx="8" fill="#fff" stroke="#5c4d7d" filter="url(#cardShadow)"/>
  <text x="630" y="468" text-anchor="middle" class="boxTitle">大屏专线 · 大屏只读接口</text>
  <text x="630" y="488" text-anchor="middle" class="boxSub">请求头令牌 · 大棚列表 · 总览 · 环境历史</text>
  <text x="630" y="504" text-anchor="middle" class="boxSub">与管理端登录态解耦 · 绑定信息写入大屏设备表</text>
  <rect x="836" y="438" width="444" height="84" rx="8" fill="#fff" stroke="#c4502a" filter="url(#cardShadow)"/>
  <text x="1058" y="468" text-anchor="middle" class="boxTitle">消息代理（Mosquitto）</text>
  <text x="1058" y="488" text-anchor="middle" class="boxSub">遥测 · 心跳 · 设备回调 · 服务端订阅</text>
  <text x="1058" y="504" text-anchor="middle" class="boxSub">消息体量校验 · 入库与作业下发联动</text>
  <rect x="44" y="608" width="240" height="120" rx="8" fill="#1a1714" stroke="#1a1714" filter="url(#cardShadow)"/>
  <text x="164" y="638" text-anchor="middle" fill="#f7f3eb" class="boxTitle">认证与用户（module.auth）</text>
  <text x="164" y="658" text-anchor="middle" fill="#c8bfb3" class="boxSub">管理员登录 · 角色权限</text>
  <text x="164" y="674" text-anchor="middle" fill="#c8bfb3" class="boxSub">小程序微信入口等</text>
  <rect x="300" y="608" width="240" height="120" rx="8" fill="#2c333d" stroke="#2c333d" filter="url(#cardShadow)"/>
  <text x="420" y="638" text-anchor="middle" fill="#f7f3eb" class="boxTitle">地块与传感器（plot / sensor）</text>
  <text x="420" y="658" text-anchor="middle" fill="#c8bfb3" class="boxSub">大棚 · 点位 · 批次 · 设备档案</text>
  <text x="420" y="674" text-anchor="middle" fill="#c8bfb3" class="boxSub">时序数据 · 在线状态</text>
  <rect x="556" y="608" width="240" height="120" rx="8" fill="#3d2918" stroke="#3d2918" filter="url(#cardShadow)"/>
  <text x="676" y="638" text-anchor="middle" fill="#f7f3eb" class="boxTitle">作业任务与物联（module.task）</text>
  <text x="676" y="658" text-anchor="middle" fill="#c8bfb3" class="boxSub">作业任务表 · 队列 · 执行器</text>
  <text x="676" y="674" text-anchor="middle" fill="#c8bfb3" class="boxSub">回调解析 · 设备生命周期</text>
  <rect x="812" y="608" width="240" height="120" rx="8" fill="#2d4a3e" stroke="#2d4a3e" filter="url(#cardShadow)"/>
  <text x="932" y="638" text-anchor="middle" fill="#f7f3eb" class="boxTitle">认养业务（module.adoption）</text>
  <text x="932" y="658" text-anchor="middle" fill="#c8bfb3" class="boxSub">认养码 · 订单 · 地块范围</text>
  <text x="932" y="674" text-anchor="middle" fill="#c8bfb3" class="boxSub">与任务 · 操作员责任域联动</text>
  <rect x="1068" y="608" width="216" height="120" rx="8" fill="#4a3d5c" stroke="#4a3d5c" filter="url(#cardShadow)"/>
  <text x="1176" y="632" text-anchor="middle" fill="#f7f3eb" class="boxTitle">大屏与仪表盘</text>
  <text x="1176" y="650" text-anchor="middle" fill="#c8bfb3" class="boxSub">大屏接口（module.screen）</text>
  <text x="1176" y="666" text-anchor="middle" fill="#c8bfb3" class="boxSub">仪表盘（module.dashboard）</text>
  <text x="1176" y="682" text-anchor="middle" fill="#c8bfb3" class="boxSub">聚合展示 · 消息缓冲摘要</text>
  <rect x="44" y="738" width="1240" height="44" rx="6" fill="#faf8f5" stroke="#d4cec9" filter="url(#cardShadow)"/>
  <text x="660" y="758" text-anchor="middle" class="boxTitle">扩展模块（按需）：摄像头流媒体 · 边缘接入 · 操作员责任域 · 管理聚合运维 · 人工智能扩展等</text>
  <text x="660" y="774" text-anchor="middle" class="boxSub">在线接口文档 · 库表版本迁移 · 生产参数见部署目录与环境配置</text>
  <rect x="44" y="814" width="400" height="98" rx="8" fill="#fff" stroke="#5a7aa8" stroke-width="1.2" filter="url(#cardShadow)"/>
  <text x="244" y="846" text-anchor="middle" class="boxTitle">关系库 MySQL 8 · 版本迁移（Flyway）</text>
  <text x="244" y="868" text-anchor="middle" class="boxSub">业务库：用户 · 地块 · 设备 · 时序 · 任务 · 认养 · 大屏设备等</text>
  <text x="244" y="888" text-anchor="middle" class="boxSub">结构定义与迁移脚本一致</text>
  <rect x="460" y="814" width="380" height="98" rx="8" fill="#fff" stroke="#c45c3a" stroke-width="1.2" filter="url(#cardShadow)"/>
  <text x="650" y="846" text-anchor="middle" class="boxTitle">缓存 Redis · 登录会话</text>
  <text x="650" y="868" text-anchor="middle" class="boxSub">会话存储 · 分布式场景支持</text>
  <text x="650" y="888" text-anchor="middle" class="boxSub">与大屏令牌（库表持久化）机制并存</text>
  <rect x="856" y="814" width="428" height="98" rx="8" fill="#fff" stroke="#c4502a" stroke-width="1.2" filter="url(#cardShadow)"/>
  <text x="1070" y="846" text-anchor="middle" class="boxTitle">消息代理 Mosquitto</text>
  <text x="1070" y="868" text-anchor="middle" class="boxSub">遥测上行 · 指令下行 · 认证与加密按环境配置</text>
  <text x="1070" y="888" text-anchor="middle" class="boxSub">可用仓库内脚本与模拟器联调（tools/e2e 等）</text>
  <path d="M 1142 172 Q 900 320 420 668" fill="none" stroke="#c4502a" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.85" marker-end="url(#arrIoT)"/>
  <text x="680" y="360" class="note" fill="#c4502a">物联遥测入库 → 供仪表盘 · 大屏 · 查询共用</text>
  <path d="M 512 172 Q 550 380 676 608" fill="none" stroke="#2d6a5d" stroke-width="1.5" opacity="0.85" marker-end="url(#arrBiz)"/>
  <path d="M 704 172 Q 720 380 676 608" fill="none" stroke="#2d6a5d" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.75" marker-end="url(#arrBiz)"/>
  <text x="600" y="520" class="note" fill="#2d6a5d">认养 · 任务写入 · 审核闭环</text>
  <path d="M 896 172 Q 1050 280 1176 608" fill="none" stroke="#5c4d7d" stroke-width="1.5" opacity="0.85" marker-end="url(#arrScr)"/>
  <path d="M 320 172 Q 400 300 630 438" fill="none" stroke="#5c4d7d" stroke-width="1.2" stroke-dasharray="6 4" opacity="0.7" marker-end="url(#arrScr)"/>
  <text x="780" y="260" class="note" fill="#5c4d7d">大屏消费大屏接口 · 令牌由管理端绑定发放</text>
  <path d="M 128 172 Q 200 240 144 254" fill="none" stroke="#3d5a80" stroke-width="1.3" marker-end="url(#arrGray)"/>
  <path d="M 1142 172 Q 1000 280 1058 438" fill="none" stroke="#c4502a" stroke-width="1.4" marker-end="url(#arrIoT)"/>
  <text x="660" y="962" text-anchor="middle" class="note">图例：红色弧线—物联与消息 · 绿色—认养与作业 · 紫色—大屏专线 · 灰色—管理配置（仅为关联示意，实施以接口与库表为准）</text>
</svg>