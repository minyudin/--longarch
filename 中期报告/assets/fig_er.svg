<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="700" viewBox="0 0 920 700">
  <defs>
    <linearGradient id="erbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f3eb"/>
      <stop offset="100%" stop-color="#efe9de"/>
    </linearGradient>
    <filter id="ershadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#1a1714" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#erbg)"/>
  <text x="460" y="34" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#1a1714">Core E-R diagram (logical)</text>
  <text x="460" y="54" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#6b6460">user, plot, adoption_order, adoption_code, operation_task, actuator_device, operator_plot_binding</text>

  <!-- user -->
  <rect x="360" y="78" width="200" height="56" rx="8" fill="#ffffff" stroke="#c4502a" stroke-width="1.5" filter="url(#ershadow)"/>
  <text x="460" y="108" text-anchor="middle" font-family="Consolas, monospace" font-size="14" font-weight="700" fill="#1a1714">user</text>
  <text x="460" y="126" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" fill="#6b6460">PK id, role, account...</text>

  <!-- plot -->
  <rect x="380" y="200" width="160" height="56" rx="8" fill="#ffffff" stroke="#1a1714" stroke-width="1.5" filter="url(#ershadow)"/>
  <text x="460" y="230" text-anchor="middle" font-family="Consolas, monospace" font-size="14" font-weight="700" fill="#1a1714">plot</text>
  <text x="460" y="248" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" fill="#6b6460">plot master, status...</text>

  <!-- adoption_order -->
  <rect x="72" y="188" width="196" height="56" rx="8" fill="#faf8f5" stroke="#d4cec9" stroke-width="1.2" filter="url(#ershadow)"/>
  <text x="170" y="218" text-anchor="middle" font-family="Consolas, monospace" font-size="11.5" font-weight="700" fill="#1a1714">adoption_order</text>
  <text x="170" y="236" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6b6460">FK user, plot...</text>

  <!-- adoption_code -->
  <rect x="652" y="188" width="196" height="56" rx="8" fill="#faf8f5" stroke="#d4cec9" stroke-width="1.2" filter="url(#ershadow)"/>
  <text x="750" y="218" text-anchor="middle" font-family="Consolas, monospace" font-size="11.5" font-weight="700" fill="#1a1714">adoption_code</text>
  <text x="750" y="236" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6b6460">code, FK plot / order...</text>

  <!-- operation_task -->
  <rect x="120" y="332" width="420" height="64" rx="8" fill="#1a1714" stroke="#1a1714" filter="url(#ershadow)"/>
  <text x="330" y="362" text-anchor="middle" font-family="Consolas, monospace" font-size="13" font-weight="700" fill="#f7f3eb">operation_task</text>
  <text x="330" y="382" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" fill="#b8a98c">FK plot, device, users; review + execution state...</text>

  <!-- actuator_device -->
  <rect x="568" y="332" width="292" height="64" rx="8" fill="#faf8f5" stroke="#c4502a" stroke-width="1.2" filter="url(#ershadow)"/>
  <text x="714" y="362" text-anchor="middle" font-family="Consolas, monospace" font-size="12" font-weight="700" fill="#1a1714">actuator_device</text>
  <text x="714" y="382" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6b6460">FK plot, online, device_no...</text>

  <!-- operator_plot_binding -->
  <rect x="280" y="508" width="360" height="56" rx="8" fill="#ffffff" stroke="#d4cec9" stroke-width="1.2" filter="url(#ershadow)"/>
  <text x="460" y="536" text-anchor="middle" font-family="Consolas, monospace" font-size="12" font-weight="700" fill="#1a1714">operator_plot_binding</text>
  <text x="460" y="552" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6b6460">FK operator user, plot; is_primary, status...</text>

  <!-- user to plot vertical -->
  <line x1="460" y1="134" x2="460" y2="200" stroke="#9d9690" stroke-width="2"/>
  <text x="472" y="172" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#c4502a">1</text>
  <text x="472" y="198" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#c4502a">N</text>

  <!-- adoption_order to user -->
  <line x1="268" y1="206" x2="360" y2="106" stroke="#9d9690" stroke-width="1.6" fill="none"/>
  <text x="300" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6b6460">N:1</text>

  <!-- adoption_order to plot -->
  <line x1="268" y1="228" x2="380" y2="228" stroke="#9d9690" stroke-width="1.6"/>
  <text x="318" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6b6460">N:1</text>

  <!-- adoption_code to plot -->
  <line x1="652" y1="228" x2="540" y2="228" stroke="#9d9690" stroke-width="1.6"/>
  <text x="600" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6b6460">N:1</text>

  <!-- plot to operation_task -->
  <line x1="460" y1="256" x2="330" y2="332" stroke="#9d9690" stroke-width="2"/>
  <text x="388" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#c4502a">1:N</text>

  <!-- user to operation_task -->
  <line x1="420" y1="134" x2="260" y2="332" stroke="#9d9690" stroke-width="1.4" fill="none"/>
  <text x="320" y="240" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6b6460">1:N</text>

  <!-- plot to actuator_device dashed -->
  <path d="M 520 228 Q 600 280 650 332" stroke="#c4502a" stroke-width="1.5" fill="none" stroke-dasharray="5 4"/>
  <text x="598" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#c4502a">1:N</text>

  <!-- task to device -->
  <line x1="540" y1="364" x2="568" y2="364" stroke="#9d9690" stroke-width="2"/>
  <text x="552" y="358" font-family="Segoe UI, Arial, sans-serif" font-size="8.5" fill="#6b6460">FK</text>

  <!-- user to binding -->
  <path d="M 400 134 L 400 508" stroke="#9d9690" stroke-width="1.3" fill="none"/>
  <text x="382" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6b6460">1:N</text>

  <!-- plot to binding -->
  <path d="M 520 256 L 520 508" stroke="#9d9690" stroke-width="1.3" fill="none"/>
  <text x="528" y="392" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#6b6460">1:N</text>

  <text x="460" y="492" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" fill="#c4502a">M:N between operator (user) and plot resolved by operator_plot_binding</text>

  <rect x="40" y="590" width="840" height="92" rx="6" fill="#faf8f5" stroke="#e5dfd8"/>
  <text x="56" y="614" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#1a1714">Notes</text>
  <text x="56" y="634" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" fill="#6b6460">Cardinality is logical; physical PK/FK and column list follow DDL in repository.</text>
  <text x="56" y="652" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" fill="#6b6460">Dashed: multiple actuator devices per plot. Solid: adoption and task flows centered on plot.</text>
  <text x="56" y="668" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8a827a">Chinese field names and table comments: see report section 3.2.</text>
</svg>
